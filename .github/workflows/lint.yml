name: Lint

on:
  workflow_call:

jobs:
  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: celestiaorg/.github/.github/actions/markdown-lint@main

  golangci:
    name: golangci-lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    env:
      GO111MODULE: on
    steps:
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.2'
      - uses: actions/checkout@v7
      - uses: technote-space/get-diff-action@v6.1.2
        with:
          PATTERNS: |
            **/**.go
            go.mod
            go.sum
      - uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee
        with:
          version: v2.11.4
          args: --timeout 10m
          github-token: ${{ secrets.github_token }}
        if: env.GIT_DIFF
